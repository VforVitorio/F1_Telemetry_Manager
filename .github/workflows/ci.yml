name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "docs/**", "chore/**", "ci/**"]
  pull_request:
    branches: ["main", "dev", "testVictor", "testSanti"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      # Critical checks only (syntax errors + undefined names). Keeps CI green on the
      # existing codebase while catching real breakage; broadened once the SPA lands (see #25).
      - name: Ruff critical checks
        run: ruff check --output-format=github --select=E9,F63,F7,F82 .

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # deps-lite: the hermetic tests import only backend.models,
      # backend.services.chatbot and the per-router endpoint modules, whose
      # module-level imports are stdlib + requests + pydantic + fastapi
      # (fastmcp is imported lazily, inside functions). fastapi + httpx back the
      # FastAPI TestClient the contract/integration suite uses; httpx is
      # starlette's test transport. Installing from pyproject.toml /
      # requirements.txt would pull the heavy ML stack and the broken
      # openai-whisper pin (#28) — deliberately avoided.
      #
      # The FakeOpenAI stub binds 127.0.0.1:1234; on the runner that port is
      # free so the integration tests run. Locally, a dev's live LM Studio on
      # :1234 makes them skip (never fail) — the documented MVP (Testing T-3,
      # AUDIT_TESTING_QA §11); an env-configurable port is a separate enabler.
      # python-dotenv is featherweight (pure-python) and is a module-level import
      # of backend.core.config, which the security tests import; it does not pull
      # the heavy ML stack, so it stays in the deps-lite set.
      - name: Install test deps
        run: pip install pytest pytest-asyncio requests pydantic fastapi httpx python-dotenv
      - name: Run unit tests
        run: pytest tests/ -v

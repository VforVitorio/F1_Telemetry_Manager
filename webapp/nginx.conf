# nginx serves the built SPA and reverse-proxies the API so the browser is
# always same-origin (zero CORS). Mirrors the Vite dev proxy in vite.config.ts.
#
# --- WHERE TO CHANGE IF THE BACKEND CONTRACT CHANGES ---
# - backend host/port: the proxy_pass below (compose service name = backend).
# - API prefix: the `location /api/` block (backend serves under /api/v1/*).
# - SSE endpoints (chat streaming): proxy_buffering must stay off.
# - WebSocket (voice, issue #40): needs an http-level `map $http_upgrade
#   $connection_upgrade` + Upgrade/Connection headers; a `map` cannot live in
#   this server block, so wire it up when the voice screen lands.
server {
    listen 80;
    server_name _;
    # Chat image attachments (#39) POST base64 data-URIs; lift nginx's 1m default.
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets can be cached hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the FastAPI backend (compose service name: backend).
    # proxy_buffering off keeps SSE (chat token streaming) flowing incrementally.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}

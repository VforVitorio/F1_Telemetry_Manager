services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: f1_backend
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - F1_STRAT_DATA_ROOT=/app/data
    volumes:
      - ./backend:/app/backend
      - ../../src:/app/src:ro
      - ../../data:/app/data:ro
      - ../../data/rag:/app/data/rag:rw
      - backend_cache:/root/.cache
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - f1_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: f1_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app/frontend
      - frontend_cache:/root/.cache
    command: streamlit run frontend/app/main.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    networks:
      - f1_network

networks:
  f1_network:
    driver: bridge

volumes:
  backend_cache:
  frontend_cache:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: f1_backend
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - F1_STRAT_DATA_ROOT=/app/data
      - LM_STUDIO_HOST=host.docker.internal
    volumes:
      - ./backend:/app/backend
      - ../../src:/app/src:ro
      - ../../data:/app/data:ro
      - ../../data/rag:/app/data/rag:rw
      - backend_cache:/root/.cache
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - f1_network

  # Cutover done (#43): the React SPA owns :8501 and the Streamlit service is
  # gone from compose. The legacy Streamlit app was later removed from the repo
  # entirely; it survives in git history and the parent's legacy_version branch.
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: f1_webapp
    ports:
      - "8501:80"
    depends_on:
      - backend
    networks:
      - f1_network

networks:
  f1_network:
    driver: bridge

volumes:
  backend_cache:
